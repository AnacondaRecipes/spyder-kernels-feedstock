{% set name = "spyder-kernels" %}
{% set version = "3.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/{{ name.split('-')[0] }}-ide/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 7c00ee218ceb534f05e6a9640919f0283db88f0f3788c5f487b741fcb2d293cc

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed -vv
  skip: true  # [py<39]

requirements:
  host:
    - pip
    - python
    - setuptools
    - wheel
  run:
    - python
    - cloudpickle
    - ipykernel >=6.29.3,<7
    - ipython >=8.15.0,<10,!=8.17.1,!=9.1.0,!=9.2.0,!=9.3.0,!=9.4.0
    - jupyter_client >=7.4.9,<9.0.0
    - packaging
    - pyxdg >=0.26  # [linux]
    - pyzmq >=24.0.0
    - traitlets >=5.14.3
    - wurlitzer >=1.0.3  # [not win]

# Verified test_console_kernel.py works locally but requires interactive settings so skipping on CI
# Update 3.1.0: test_console_kernel.py tested locally
{% set ignore_tests = " --ignore=spyder_kernels/console/tests/test_console_kernel.py" %}
# >   assert data[0]['data'].shape == (512, 512)
# E   TypeError: 'NoneType' object is not subscriptable
{% set deselect_tests = "--deselect=spyder_kernels/utils/tests/test_iofuncs.py::test_load_dicom_files" %}
# h5py and polars missing for 314
{% set deselect_tests = deselect_tests + " --deselect=spyder_kernels/utils/tests/test_iofuncs.py::test_save_load_hdf5_files" %}  # [py>313]
{% set deselect_tests = deselect_tests + " --deselect=spyder_kernels/utils/tests/test_nsview.py::test_polars_dataframe" %}  # [py>313]

test:
  source_files:
    - spyder_kernels
  imports:
    - spyder_kernels
    - spyder_kernels.comms.commbase
    - spyder_kernels.comms.decorators
    - spyder_kernels.comms.frontendcomm
    - spyder_kernels.comms.utils
    - spyder_kernels.console.kernel
    - spyder_kernels.console.kernelapp
    - spyder_kernels.console.shell
    - spyder_kernels.customize.code_runner
    - spyder_kernels.customize.namespace_manager
    - spyder_kernels.customize.spyderpdb
    - spyder_kernels.customize.umr
    - spyder_kernels.customize.utils
    - spyder_kernels.utils.dochelpers
    - spyder_kernels.utils.iofuncs
    - spyder_kernels.utils.lazymodules
    - spyder_kernels.utils.misc
    - spyder_kernels.utils.mpl
    - spyder_kernels.utils.nsview
    - spyder_kernels.utils.pythonenv
    - spyder_kernels.utils.style
    - spyder_kernels.utils.test_utils
  requires:
    - pip
    - flaky
    - mock
    - numpy
    - polars  # [py<314]
    - pandas
    - pytest
    - pytest-cov
    - pytest-asyncio
    - scipy
    - xarray
    - pillow
    - django
    - h5py  # [py<314]
  commands:
    - pip check
    - python -m pytest -vv spyder_kernels {{ ignore_tests }} {{ deselect_tests }}

about:
  home: https://www.spyder-ide.org
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: "Jupyter kernels for Spyder's console"
  description: |
    Provides Jupyter kernels for use with the consoles of Spyder, the
    Scientific Python Development Environment. These can launched either
    through Spyder itself or in an independent Python session, and allow for
    interactive or file-based execution of Python code in different
    environments, all inside the IDE.
    For more on Spyder, visit https://www.spyder-ide.org
    To learn about creating, connecting and using Spyder's consoles, read:
    https://docs.spyder-ide.org/ipythonconsole.html
    For advice on managing packages and environments with Spyder, see:
    https://github.com/spyder-ide/spyder/wiki/Working-with-packages-and-environments-in-Spyder
  doc_url: https://docs.spyder-ide.org/current/index.html
  dev_url: https://github.com/spyder-ide/spyder-kernels

extra:
  recipe-maintainers:
    - ccordoba12
    - dalthviz